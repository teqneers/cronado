version: 2

builds:
  - main: .
    binary: cronado
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

dockers_v2:
  - images:
      - "ghcr.io/teqneers/cronado"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "v{{ .Major }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    dockerfile: docker/Dockerfile.release
    labels:
      "org.opencontainers.image.source": "https://github.com/teqneers/cronado"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.description": "Lightweight cron job scheduler for Docker containers"
      "org.opencontainers.image.licenses": "MIT"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
